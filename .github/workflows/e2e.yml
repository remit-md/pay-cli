name: E2E Acceptance Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      provider_address:
        description: "Provider wallet address for test payments"
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
  PAYSKILL_SIGNER_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
  PAYSKILL_API_URL: ${{ secrets.PAYSKILL_TESTNET_URL }}
  PAYSKILL_CHAIN_ID: "84532"
  PAYSKILL_ROUTER_ADDRESS: "0xE0Aa45e6937F3b9Fc0BEe457361885Cb9bfC067F"
  PAYSKILL_TESTNET_PROVIDER: ${{ github.event.inputs.provider_address }}

permissions:
  contents: read

jobs:
  e2e:
    name: CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Initialize CLI
        run: cargo run -- init

      - name: Mint testnet USDC
        continue-on-error: true
        run: cargo run -- --json mint 200.00

      - name: Run all E2E acceptance tests
        run: cargo test --test e2e -- --ignored --test-threads=1
