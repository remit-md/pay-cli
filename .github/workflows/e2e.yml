name: E2E Acceptance Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      provider_address:
        description: "Provider wallet address for test payments"
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PAYSKILL_TESTNET_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
  PAYSKILL_SIGNER_KEY: ${{ secrets.PAYSKILL_TESTNET_KEY }}
  PAYSKILL_API_URL: ${{ secrets.PAYSKILL_TESTNET_URL }}
  PAYSKILL_CHAIN_ID: "84532"
  PAYSKILL_ROUTER_ADDRESS: "0xE0Aa45e6937F3b9Fc0BEe457361885Cb9bfC067F"
  PAYSKILL_TESTNET_PROVIDER: ${{ github.event.inputs.provider_address }}
  PAYSKILL_TESTNET_PROVIDER_KEY: ${{ secrets.PAYSKILL_TESTNET_PROVIDER_KEY }}

permissions:
  contents: read

jobs:
  e2e:
    name: CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Initialize CLI
        run: cargo run -- init

      - name: Ensure sufficient testnet USDC balance
        run: |
          # Mint only when the shared CI wallet is below the floor. The mint
          # endpoint rate-limits 1 call per wallet per hour, and we reuse the
          # same PAYSKILL_TESTNET_KEY across all CI runs — without this guard,
          # CI hits 429 whenever two runs land within an hour.
          BAL=$(cargo run -- status 2>/dev/null | jq -r '.balance_usdc // "0"')
          echo "Current balance: $BAL USDC"
          if [ "$(awk -v v="$BAL" 'BEGIN{print (v<20)}')" = "1" ]; then
            echo "Balance below $20 floor — minting 200 USDC"
            cargo run -- mint 200.00
          else
            echo "Balance sufficient — skipping mint"
          fi

      - name: Run all E2E acceptance tests
        run: cargo test --test e2e -- --ignored --test-threads=1
