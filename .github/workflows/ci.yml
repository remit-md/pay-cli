name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Install OWS CLI
        run: |
          curl -fsSL https://github.com/open-wallet-standard/core/releases/latest/download/ows-linux-x86_64 -o /usr/local/bin/ows
          chmod +x /usr/local/bin/ows
          ows --version

      - name: OWS integration tests
        run: cargo test --test e2e -- --ignored ows_
        continue-on-error: true
